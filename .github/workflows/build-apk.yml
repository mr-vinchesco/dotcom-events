name: Build DotCom Events APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK (EAS)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 3. Install dependencies
      - name: Install dependencies
        run: npm install

      # 4. Install EAS CLI (correct tool)
      - name: Install EAS CLI
        run: npm install -g eas-cli

      # 5. Login to Expo
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      # 6. Ensure EAS config exists
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      # 7. Build APK (cloud build)
      - name: Build APK
        run: eas build --platform android --profile preview --non-interactive --wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      # 8. Upload build artifacts (logs only)
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eas-build-logs
          path: .eas
