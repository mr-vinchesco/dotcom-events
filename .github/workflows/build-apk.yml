name: Build DotCom Events APK

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # 1. Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Set up Java (required for Android builds)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 4. Set up Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 5. Install Expo CLI and EAS CLI
      - name: Install Expo and EAS CLI
        run: |
          npm install -g @expo/eas-cli expo-cli

      # 6. Install project dependencies
      - name: Install dependencies
        run: npm ci

      # 7. Build APK locally using Expo's prebuild + Gradle
      - name: Prebuild Android
        run: |
          npx expo prebuild --platform android --clean
        env:
          EXPO_NO_DOTENV: 1

      # 8. Build APK with Gradle
      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2 -Xmx3g"

      # 9. Find and rename the APK
      - name: Locate APK
        run: |
          find android -name "*.apk" -type f
          APK_PATH=$(find android -name "app-release*.apk" -o -name "app-release-unsigned.apk" | head -1)
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV
          cp "$APK_PATH" DotComEvents.apk

      # 10. Upload APK as artifact (downloadable from GitHub)
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: DotComEvents-APK
          path: DotComEvents.apk
          retention-days: 30
          if-no-files-found: error

      # 11. Create a release if this is a tagged push
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: DotComEvents.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
